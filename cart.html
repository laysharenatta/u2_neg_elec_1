<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honey Pop - Carrito</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

  <header class="bg-pink-500 text-white py-4 shadow-md">
    <div class="container mx-auto flex justify-between items-center px-6">
      <h1 class="text-2xl font-bold">🛒 Carrito</h1>
      <a href="index.html" class="text-sm underline hover:text-gray-200">Seguir comprando</a>
    </div>
  </header>

  <main class="flex-grow container mx-auto px-6 py-10">
    <h2 class="text-3xl font-semibold mb-6">Tus productos</h2>

    <div class="overflow-x-auto">
      <table class="min-w-full bg-white border border-gray-200 rounded-lg shadow">
        <thead>
          <tr class="bg-pink-100 text-pink-700">
            <th class="py-3 px-4 text-left">Producto</th>
            <th class="py-3 px-4 text-center">Cantidad</th>
            <th class="py-3 px-4 text-right">Precio</th>
            <th class="py-3 px-4 text-right">Subtotal</th>
            <th class="py-3 px-4 text-center">Acciones</th>
          </tr>
        </thead>
        <tbody id="cartTableBody">
        </tbody>
      </table>
    </div>

    <div class="mt-6 flex justify-end">
      <div class="bg-gray-100 p-6 rounded-lg shadow-md w-full sm:w-1/3">

        <div class="flex justify-between text-lg font-medium mb-2">
          <span>Subtotal:</span>
          <span id="cartSubtotal">$0.00</span>
        </div>
        <div class="flex justify-between text-lg font-medium mb-3 text-gray-600">
          <span id="ivaLabel">IVA (16%):</span>
          <span id="cartIva">$0.00</span>
        </div>
        <div class="flex justify-between text-xl font-bold text-pink-600 border-t border-gray-300 pt-3 mb-4">
          <span>Total:</span>
          <span id="cartTotalAmount">$0.00</span>
        </div>

        <div class="mb-4 bg-white p-3 rounded border border-gray-200">
          <label for="ivaInput" class="block text-sm font-medium text-gray-700 mb-2">Tasa de IVA (%)</label>
          <div class="flex items-center gap-2">
            <input type="number" id="ivaInput" value="16" min="0" max="100"
              class="w-20 border border-gray-300 rounded px-2 py-1 text-center focus:outline-none focus:ring-2 focus:ring-pink-400">
            <span class="text-gray-600 font-medium">%</span>
            <button onclick="actualizarIva()"
              class="bg-pink-100 text-pink-700 hover:bg-pink-200 px-3 py-1 rounded transition text-sm font-semibold ml-auto border border-pink-200">
              Actualizar
            </button>
          </div>
        </div>

     <a href="formpago.html">
  <button
    class="mt-2 w-full bg-pink-500 hover:bg-pink-600 text-white font-semibold py-2 px-4 rounded-lg transition shadow-md">
    Proceder al pago
  </button>
</a>
      </div>
    </div>
  </main>

  <footer class="bg-gray-800 text-white py-4 px-2 mt-6">
    <div class="flex flex-col justify-center items-center gap-2">
      <a href="#" class="hover:scale-105 transition duration-300">
        <img src="/honeypop.webp" alt="Honey Pop Logo" class="w-16 h-16 object-contain">
      </a>
      <p class="text-xs text-gray-300 max-w-xs text-center leading-tight">
        En Honey Pop creemos que cada bocado debe ser un momento feliz.
        ¡Gracias por endulzar tu día con nosotros!
      </p>

      <div class="flex gap-3 text-xs text-pink-300 mt-2">
        <button class="hover:underline hover:text-pink-400 transition">Aviso de privacidad</button>
        <span>|</span>
        <button class="hover:underline hover:text-pink-400 transition">Términos y condiciones</button>
        <span>|</span>
        <button class="hover:underline hover:text-pink-400 transition">Políticas de compra y venta</button>
        <span>|</span>
        <button class="hover:underline hover:text-pink-400 transition">Cumplimiento legal</button>
      </div>

      <div class="mt-3 text-center text-xs text-gray-500 border-t border-gray-700 pt-2">
        © 2025 Honey Pop. Todos los derechos reservados.
      </div>
    </div>
  </footer>

  <script>
    // Leemos la memoria del navegador.
    let carrito = JSON.parse(localStorage.getItem('honeyPopCart')) || [];
    // Leemos el IVA de la memoria, si no existe usamos 16 por defecto
    let tasaIva = parseFloat(localStorage.getItem('honeyPopIva')) || 16;

    const cartTableBody = document.getElementById('cartTableBody');
    const subtotalElement = document.getElementById('cartSubtotal');
    const ivaLabelElement = document.getElementById('ivaLabel');
    const ivaElement = document.getElementById('cartIva');
    const totalElement = document.getElementById('cartTotalAmount');
    const ivaInput = document.getElementById('ivaInput');

    // Inicializamos el input con el valor actual
    ivaInput.value = tasaIva;

    // Función principal para dibujar la tabla
    function renderizarCarrito() {
      cartTableBody.innerHTML = '';
      let subtotalGeneral = 0;

      // Si no hay productos, mostrar mensaje
      if (carrito.length === 0) {
        cartTableBody.innerHTML = `
          <tr>
            <td colspan="5" class="py-10 text-center text-gray-500 text-xl font-semibold">
              Tu carrito está vacío. <br>
              <a href="index.html" class="text-pink-500 underline text-sm mt-2 inline-block">¡Agrega unos deliciosos postres!</a>
            </td>
          </tr>
        `;
        subtotalElement.innerText = '$0.00';
        ivaLabelElement.innerText = `IVA (${tasaIva}%):`;
        ivaElement.innerText = '$0.00';
        totalElement.innerText = '$0.00';
        return;
      }

      // Si hay productos, dibujarlos uno por uno
      carrito.forEach((item, index) => {
        const subtotalProducto = item.precio * item.cantidad;
        subtotalGeneral += subtotalProducto;

        // Por si algún producto viejo no se le guardó la imagen, ponemos una por defecto
        const imgSrc = item.imagen ? item.imagen : 'honeypop.webp';

        cartTableBody.innerHTML += `
          <tr class="border-t hover:bg-gray-50 transition">
            <td class="py-3 px-4 flex items-center gap-4">
              <img src="${imgSrc}" alt="${item.nombre}" class="w-16 h-16 sm:w-20 sm:h-20 rounded-lg object-cover shadow-sm">
              <span class="font-semibold text-lg">${item.nombre}</span>
            </td>
            <td class="py-3 px-4 text-center">
              <div class="flex justify-center items-center gap-2">
                <button onclick="cambiarCantidadCartPage(${index}, -1)" class="bg-gray-200 px-3 py-1 rounded-md hover:bg-gray-300 font-bold transition text-gray-700">–</button>
                <span class="w-6 text-center font-bold">${item.cantidad}</span>
                <button onclick="cambiarCantidadCartPage(${index}, 1)" class="bg-gray-200 px-3 py-1 rounded-md hover:bg-gray-300 font-bold transition text-gray-700">+</button>
              </div>
            </td>
            <td class="py-3 px-4 text-right text-gray-600">$${item.precio.toFixed(2)}</td>
            <td class="py-3 px-4 text-right font-bold text-[#F2884B] text-lg">$${subtotalProducto.toFixed(2)}</td>
            <td class="py-3 px-4 text-center">
              <button onclick="eliminarProductoCartPage(${index})" class="text-red-500 hover:text-white hover:bg-red-500 p-2 rounded transition font-semibold">
                Eliminar
              </button>
            </td>
          </tr>
        `;
      });

      // Cálculos finales
      const montoIva = subtotalGeneral * (tasaIva / 100);
      const totalFinal = subtotalGeneral + montoIva;

      // Actualizar los textos
      subtotalElement.innerText = `$${subtotalGeneral.toFixed(2)}`;
      ivaLabelElement.innerText = `IVA (${tasaIva}%):`;
      ivaElement.innerText = `$${montoIva.toFixed(2)}`;
      totalElement.innerText = `$${totalFinal.toFixed(2)}`;

      // Actualizar la memoria
      localStorage.setItem('honeyPopCart', JSON.stringify(carrito));
    }

    // Funciones de botones + y -
    function cambiarCantidadCartPage(index, delta) {
      carrito[index].cantidad += delta;

      // Si llega a cero, lo sacamos del carrito
      if (carrito[index].cantidad <= 0) {
        carrito.splice(index, 1);
      }
      renderizarCarrito(); // Redibujar
    }

    // Función del botón eliminar
    function eliminarProductoCartPage(index) {
      carrito.splice(index, 1);
      renderizarCarrito(); // Redibujar
    }

    // Función para actualizar el porcentaje de IVA
    function actualizarIva() {
      const nuevoIva = parseFloat(ivaInput.value);

      // Validamos que sea un número válido y no negativo
      if (!isNaN(nuevoIva) && nuevoIva >= 0) {
        tasaIva = nuevoIva;
        localStorage.setItem('honeyPopIva', tasaIva); // Guardamos la nueva tasa en memoria
        renderizarCarrito(); // Redibujamos para aplicar el cálculo
      } else {
        alert("Por favor, ingresa un porcentaje de IVA válido.");
        ivaInput.value = tasaIva; // Restauramos el valor anterior en el input
      }
    }

    // Arrancamos la función apenas cargue la página
    renderizarCarrito();

    
  </script>

</body>

</html>
